<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapVideo — Timestamp Bookmark Player</title>
  <meta name="description"
    content="A minimalistic video player with timestamp bookmarking. Snap moments, name them, jump back instantly.">
  <meta name="author" content="Tanay Kumar Bera">
  <meta name="keywords" content="video player, timestamp bookmark, snapvideo, offline player, timestamps">
  <meta property="og:title" content="SnapVideo — Timestamp Bookmark Player">
  <meta property="og:description"
    content="A minimalistic video player with timestamp bookmarking. Snap moments, name them, jump back instantly.">
  <meta property="og:image" content="icons/icon-512.png">
  <meta property="og:url" content="https://tanaykumarbera.github.io/snap-video/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#7c5cfc">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.4);
      --surface: rgba(255, 255, 255, 0.03);
      --surface-border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* Animated background orbs */
    .bg-orbs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.5;
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: rgba(124, 92, 252, 0.3);
      animation-delay: 0s;
    }

    .orb-2 {
      bottom: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: rgba(45, 20, 150, 0.3);
      animation-delay: -5s;
    }

    .orb-3 {
      top: 40%;
      left: 60%;
      width: 40vw;
      height: 40vw;
      background: rgba(200, 100, 255, 0.15);
      animation-delay: -10s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(5%, 10%) scale(1.1);
      }

      100% {
        transform: translate(-5%, -5%) scale(0.9);
      }
    }

    /* Header styling with glassmorphism */
    header {
      padding: 1.5rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      background: rgba(5, 5, 5, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--surface-border);
      transition: all 0.3s ease;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .brand svg {
      color: var(--text);
    }

    .brand-accent {
      color: var(--accent);
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      margin-left: 2rem;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    /* Main Hero Area */
    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
      position: relative;
    }

    /* Staggered text animations */
    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUpAnim 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .delay-1 {
      animation-delay: 0.1s;
    }

    .delay-2 {
      animation-delay: 0.2s;
    }

    .delay-3 {
      animation-delay: 0.3s;
    }

    .delay-4 {
      animation-delay: 0.5s;
    }

    @keyframes fadeUpAnim {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 99px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    h1 {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1.05;
      margin: 0 0 1.5rem 0;
      max-width: 900px;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      font-size: 1.35rem;
      color: var(--text-muted);
      max-width: 650px;
      margin: 0 auto 3.5rem auto;
      line-height: 1.6;
      font-weight: 300;
    }

    /* Buttons */
    .cta-container {
      display: flex;
      gap: 1.25rem;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2.5rem;
      font-size: 1.05rem;
      font-weight: 500;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      border: none;
      gap: 0.75rem;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
      box-shadow: 0 0 0 1px rgba(124, 92, 252, 0.5), 0 8px 24px -4px var(--accent-glow);
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(255, 255, 255, 0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn-primary:hover {
      box-shadow: 0 0 0 1px rgba(124, 92, 252, 0.8), 0 12px 32px 0 var(--accent-glow);
      transform: translateY(-2px);
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--text);
      border: 1px solid var(--surface-border);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background-color: var(--surface);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    /* 3D Floating Hero Image */
    .hero-mockup-wrapper {
      margin-top: 5rem;
      width: 100%;
      max-width: 1050px;
      perspective: 1200px;
    }

    .hero-mockup {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      transform: rotateX(8deg);
      transition: transform 0.5s ease;
      animation: float-mockup 6s infinite ease-in-out alternate;
    }

    .hero-mockup:hover {
      transform: rotateX(2deg) rotateY(0deg) scale(1.02);
      animation-play-state: paused;
    }

    @keyframes float-mockup {
      0% {
        transform: translateY(0px) rotateX(8deg);
      }

      100% {
        transform: translateY(-15px) rotateX(6deg);
      }
    }

    .hero-mockup-inner {
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      position: relative;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-mockup-inner::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      pointer-events: none;
      border-radius: 12px;
    }

    .mockup-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      header {
        padding: 1.25rem 2rem;
      }

      h1 {
        font-size: 3rem;
      }

      p.subtitle {
        font-size: 1.15rem;
      }

      .cta-container {
        flex-direction: column;
        width: 100%;
        max-width: 300px;
        margin: 0 auto;
      }

      .nav-links {
        display: none;
      }

      .hero-mockup {
        transform: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>

  <!-- Animated Orbs Background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header>
    <a href="#" class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7" />
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
      </svg>
      Snap<span class="brand-accent">Video</span>
    </a>
    <nav class="nav-links">
      <a href="terms.html">Terms of Service</a>
      <a href="https://github.com/tanaykumarbera/snap-video" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </header>

  <main>
    <div class="pill fade-up delay-1">
      <span class="dot"></span> 100% Offline Progressive Web App
    </div>

    <h1 class="fade-up delay-2">Your timestamps. <br>Beautifully organized.</h1>

    <p class="subtitle fade-up delay-3">
      Snap moments, name them, and jump back instantly.
      A premium, serverless video player built entirely for your local files.
    </p>

    <div class="cta-container fade-up delay-4">
      <a href="app/" class="btn btn-primary">
        Launch Web App
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </a>
      <a href="https://github.com/tanaykumarbera/snap-video" class="btn btn-secondary" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
        </svg>
        View Source
      </a>
    </div>

    <!-- 3D Floating Mockup -->
    <div class="hero-mockup-wrapper fade-up delay-4">
      <div class="hero-mockup">
        <div class="hero-mockup-inner">
          <img src="screenshots/player.png" alt="SnapVideo Editor Preview" class="mockup-img"
            onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 16 9\'><rect width=\'16\' height=\'9\' fill=\'%23111\'/><text x=\'50%\' y=\'50%\' font-family=\'sans-serif\' font-size=\'0.5\' fill=\'%23666\' text-anchor=\'middle\' dy=\'.3em\'>App Preview Screenshot</text></svg>'">
        </div>
      </div>
    </div>
  </main>

  <footer
    style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.9rem; position: relative; z-index: 10;">
    💜 <a href="https://tanay.co" target="_blank" rel="noopener"
      style="color: var(--accent); text-decoration: none; font-weight: 500;">@tanay</a>
  </footer>

  <script>
    // Enhance 3D effect on mouse move
    const wrapper = document.querySelector('.hero-mockup-wrapper');
    const mockup = document.querySelector('.hero-mockup');
    const bgOrbs = document.querySelector('.bg-orbs');

    if (window.innerWidth > 768) {
      document.addEventListener('mousemove', (e) => {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 40;

        if (mockup) {
          mockup.style.animation = 'none';
          mockup.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis + 8}deg)`;
        }

        if (bgOrbs) {
          bgOrbs.style.transform = `translate(${xAxis * -4}px, ${yAxis * -4}px)`;
        }
      });

      document.addEventListener('mouseleave', () => {
        if (mockup) {
          mockup.style.animation = '';
          mockup.style.transform = `rotateY(0deg) rotateX(8deg)`;
          mockup.style.transition = 'transform 0.5s ease';
        }
        if (bgOrbs) {
          bgOrbs.style.transform = `translate(0px, 0px)`;
          bgOrbs.style.transition = 'transform 0.5s ease';
        }
      });

      document.addEventListener('mouseenter', () => {
        if (mockup) mockup.style.transition = 'none';
        if (bgOrbs) bgOrbs.style.transition = 'none';
      });
    }

    // Simple click to open App
    if (wrapper) {
      wrapper.style.cursor = 'pointer';
      wrapper.addEventListener('click', () => {
        window.location.href = 'app/';
      });
    }
  </script>
</body>

</html>
